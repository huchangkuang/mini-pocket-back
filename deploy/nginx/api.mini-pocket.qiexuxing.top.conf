# Mini Pocket API
# 推荐子域名: api.mini-pocket.qiexuxing.top
# 备选: mini-pocket.qiexuxing.top

server {
    listen 80;
    server_name api.mini-pocket.qiexuxing.top;

    # certbot 申请证书后会自动添加 443 配置
    # certbot --nginx -d api.mini-pocket.qiexuxing.top

    location / {
        proxy_pass http://127.0.0.1:3035;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
